<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Verification</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

    <style>
        body {
            background: #F8FAFC;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }
        .ambient-orb-1 {
            position: fixed;
            top: -10%;
            left: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,.15) 0%, rgba(255,255,255,0) 70%);
            animation: floatOrb 8s ease-in-out infinite alternate;
        }
        .ambient-orb-2 {
            position: fixed;
            bottom: 10%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236,72,153,.15) 0%, rgba(255,255,255,0) 70%);
            animation: floatOrb 10s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatOrb {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-40px) scale(1.1); }
        }
        .glass-card {
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226,232,240,1);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,.08);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            text-align: center;
            width: 90%;
            max-width: 350px;
            position: relative;
            z-index: 10;
            transform: scale(.95);
            opacity: 0;
            animation: popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
        }
        @keyframes popIn {
            to { transform: scale(1); opacity: 1; }
        }
        .fade-in {
            animation: fadeIn .4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body oncontextmenu="return false;">

<div class="ambient-orb-1"></div>
<div class="ambient-orb-2"></div>

<div class="glass-card">

    <div id="scanBox" class="fade-in">
        <lord-icon
            src="https://cdn.lordicon.com/rznjqrfe.json"
            trigger="loop"
            colors="primary:#A855F7,secondary:#EC4899"
            style="width:100px;height:100px">
        </lord-icon>
        <h2 style="font-size:28px;font-weight:900;margin-top:10px;">System Scan</h2>
        <p style="color:#64748B;margin-top:10px;">Verifying Device Fingerprint...</p>
        <div style="width:100%;height:12px;background:#E2E8F0;border-radius:50px;margin-top:20px;overflow:hidden;">
            <div id="progressBar" style="width:0%;height:100%;border-radius:50px;background:linear-gradient(90deg,#A855F7,#EC4899);transition:1s;"></div>
        </div>
        <p id="progressText" style="margin-top:10px;color:#A855F7;font-weight:700;">0%</p>
    </div>

    <div id="successBox" style="display:none;">
        <lord-icon
            src="https://cdn.lordicon.com/guqkthkk.json"
            trigger="in"
            colors="primary:#10b981,secondary:#34d399"
            style="width:100px;height:100px">
        </lord-icon>
        <h2 style="font-size:28px;font-weight:900;color:#10B981;">Access Granted</h2>
        <p style="margin-top:10px;color:#64748B;">Device verified successfully</p>
    </div>

    <div id="blockedBox" style="display:none;">
        <lord-icon
            src="https://cdn.lordicon.com/tdrtiskw.json"
            trigger="in"
            colors="primary:#ef4444,secondary:#f87171"
            style="width:100px;height:100px">
        </lord-icon>
        <h2 style="font-size:28px;font-weight:900;color:#EF4444;">Access Denied</h2>
        <p id="blockedReason" style="margin-top:10px;color:#64748B;">This device is already verified.</p>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCy64nXc6dQ3vyxCgHjVI_IhzhQ5cxXyf8",
        authDomain: "cash-hungama-ec64e.firebaseapp.com",
        projectId: "cash-hungama-ec64e",
        storageBucket: "cash-hungama-ec64e.firebasestorage.app",
        messagingSenderId: "1073040348802",
        appId: "1:1073040348802:web:82e1b2422916b5d6e3469b"
    };

    const BOT_TOKEN = "8976228790:AAFhJATUHQdhFo5MtSrAec2tlnQKnCA0Utw";
    const ADMIN_ID  = "7861231546";
    const MINI_APP  = "https://cashhungama.netlify.app/";

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const tg  = window.Telegram.WebApp;
    tg.expand();

    document.onkeydown = e => {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
    };

    function setProgress(pct) {
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").innerText = pct + "%";
    }

    // Verify ke baad bot user ko message bhejta hai with plain link
    async function sendOpenHome(userId) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: userId,
                    text: `🔥 Open Now & Claim ₹7 Cash Free And Instant Withdraw.! 😍\n\n👇👇 Click "Open Home" To Begin 👇👇\n\n${MINI_APP}`
                })
            });
        } catch(e) {}
    }

    async function showSuccess(userId) {
        document.getElementById("scanBox").style.display = "none";
        document.getElementById("successBox").style.display = "block";
        try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
        if (userId) await sendOpenHome(userId);
        setTimeout(() => { tg.close(); }, 2000);
    }

    function showBlocked(reason) {
        document.getElementById("scanBox").style.display = "none";
        document.getElementById("blockedBox").style.display = "block";
        document.getElementById("blockedReason").innerText = reason;
        try { tg.HapticFeedback.notificationOccurred('error'); } catch(e) {}
    }

    async function notifyAdmin(user, deviceId) {
        const name     = user?.first_name || "Unknown";
        const username = user?.username ? "@" + user.username : "No username";
        const uid      = user?.id || "Unknown";
        const msg = `✅ *New Verified User!*\n\n👤 Name: ${name}\n🔗 Username: ${username}\n🆔 Telegram ID: ${uid}\n📱 Device: \`${deviceId.substring(0,12)}...\`\n⏰ ${new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})}`;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: "Markdown" })
            });
        } catch(e) {}
    }

    async function startVerification() {
        setTimeout(() => setProgress(30), 500);
        setTimeout(() => setProgress(60), 1200);
        setTimeout(() => setProgress(90), 2000);

        const telegramUser = tg.initDataUnsafe?.user;
        const telegramId   = telegramUser?.id?.toString();

        const fp       = await FingerprintJS.load();
        const result   = await fp.get();
        const deviceId = result.visitorId;

        const deviceSnap = await getDoc(doc(db, "verified_devices", deviceId));
        if (deviceSnap.exists()) {
            setTimeout(() => setProgress(100), 2800);
            setTimeout(() => showBlocked("This device is already verified. One device per user only."), 3500);
            return;
        }

        if (telegramId) {
            const userSnap = await getDoc(doc(db, "verified_users", telegramId));
            if (userSnap.exists()) {
                setTimeout(() => setProgress(100), 2800);
                setTimeout(() => showBlocked("Your account is already verified on another device."), 3500);
                return;
            }
        }

        setTimeout(async () => {
            setProgress(100);

            await setDoc(doc(db, "verified_devices", deviceId), {
                deviceId,
                telegramId: telegramId || "unknown",
                telegramName: telegramUser?.first_name || "Unknown",
                telegramUsername: telegramUser?.username || "",
                verifiedAt: serverTimestamp()
            });

            if (telegramId) {
                await setDoc(doc(db, "verified_users", telegramId), {
                    telegramId, deviceId,
                    name: telegramUser?.first_name || "Unknown",
                    verifiedAt: serverTimestamp()
                });
            }

            await notifyAdmin(telegramUser, deviceId);
            setTimeout(() => showSuccess(telegramId), 500);

        }, 3000);
    }

    startVerification();
</script>

</body>
</html>
