<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Verification</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://cdn.lordicon.com/lordicon.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>

    <style>

        body{
            background:#F8FAFC;
            font-family:'Outfit',sans-serif;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            user-select:none;
            -webkit-user-select:none;
        }

        .ambient-orb-1{
            position:fixed;
            top:-10%;
            left:-20%;
            width:400px;
            height:400px;
            background:radial-gradient(circle,rgba(168,85,247,.15)0%,rgba(255,255,255,0)70%);
            animation:floatOrb 8s ease-in-out infinite alternate;
        }

        .ambient-orb-2{
            position:fixed;
            bottom:10%;
            right:-20%;
            width:500px;
            height:500px;
            background:radial-gradient(circle,rgba(236,72,153,.15)0%,rgba(255,255,255,0)70%);
            animation:floatOrb 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatOrb{
            0%{transform:translateY(0) scale(1);}
            100%{transform:translateY(-40px) scale(1.1);}
        }

        .glass-card{
            background:rgba(255,255,255,.95);
            backdrop-filter:blur(20px);
            border:1px solid rgba(226,232,240,1);
            box-shadow:0 10px 40px -10px rgba(0,0,0,.08);
            border-radius:2rem;
            padding:2.5rem 2rem;
            text-align:center;
            width:90%;
            max-width:350px;
            position:relative;
            z-index:10;
            transform:scale(.95);
            opacity:0;
            animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
        }

        @keyframes popIn{
            to{
                transform:scale(1);
                opacity:1;
            }
        }

        .fade-in{
            animation:fadeIn .4s ease forwards;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body oncontextmenu="return false;">

<div class="ambient-orb-1"></div>
<div class="ambient-orb-2"></div>

<div class="glass-card">

    <div id="scanBox" class="fade-in">

        <lord-icon
            src="https://cdn.lordicon.com/rznjqrfe.json"
            trigger="loop"
            colors="primary:#A855F7,secondary:#EC4899"
            style="width:100px;height:100px">
        </lord-icon>

        <h2 style="font-size:28px;font-weight:900;margin-top:10px;">
            System Scan
        </h2>

        <p style="color:#64748B;margin-top:10px;">
            Verifying Device Fingerprint...
        </p>

        <div style="width:100%;height:12px;background:#E2E8F0;border-radius:50px;margin-top:20px;overflow:hidden;">

            <div id="progressBar"
                style="
                width:0%;
                height:100%;
                border-radius:50px;
                background:linear-gradient(90deg,#A855F7,#EC4899);
                transition:1s;">
            </div>

        </div>

        <p id="progressText"
        style="margin-top:10px;color:#A855F7;font-weight:700;">
            0%
        </p>

    </div>

    <div id="successBox" style="display:none;">

        <lord-icon
            src="https://cdn.lordicon.com/guqkthkk.json"
            trigger="in"
            colors="primary:#10b981,secondary:#34d399"
            style="width:100px;height:100px">
        </lord-icon>

        <h2 style="font-size:28px;font-weight:900;color:#10B981;">
            Access Granted
        </h2>

        <p style="margin-top:10px;color:#64748B;">
            Device verified successfully
        </p>

    </div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

document.onkeydown = function(e){

    if(e.keyCode == 123){
        return false;
    }

    if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){
        return false;
    }

};

async function startVerification(){

    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    setTimeout(()=>{
        progressBar.style.width = "30%";
        progressText.innerText = "30%";
    },500);

    setTimeout(()=>{
        progressBar.style.width = "60%";
        progressText.innerText = "60%";
    },1200);

    setTimeout(()=>{
        progressBar.style.width = "90%";
        progressText.innerText = "90%";
    },2000);

    const fp = await FingerprintJS.load();

    const result = await fp.get();

    const visitorId = result.visitorId;

    console.log("Device ID:",visitorId);

    setTimeout(()=>{

        progressBar.style.width = "100%";
        progressText.innerText = "100%";

    },3000);

    setTimeout(()=>{

        document.getElementById("scanBox").style.display="none";

        document.getElementById("successBox").style.display="block";

        tg.HapticFeedback.notificationOccurred('success');

    },4000);

}

startVerification();

</script>

</body>
      </html>
