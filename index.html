<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#edf2f8;
max-width:430px;
margin:auto;
padding:16px;
overflow-x:hidden;
color:#1e293b;
}

/* ===== BALANCE CARD ===== */

.balance-card{
background:#eef3f9;
border-radius:38px;
padding:22px;
position:relative;

box-shadow:
12px 12px 25px rgba(0,0,0,0.08),
-12px -12px 25px rgba(255,255,255,0.95);

border:1px solid rgba(255,255,255,0.7);

overflow:hidden;
}

.balance-card::before{
content:'';
position:absolute;
top:-80px;
left:-60px;
width:240px;
height:160px;
background:rgba(255,255,255,0.55);
transform:rotate(-15deg);
border-radius:40px;
}

.title{
font-size:14px;
font-weight:800;
letter-spacing:2px;
color:#6b7280;
margin-bottom:20px;
position:relative;
z-index:2;
}

.balance-box{
background:#eef3f9;
padding:28px;
border-radius:28px;
text-align:center;
position:relative;
z-index:2;

box-shadow:
inset 6px 6px 14px rgba(0,0,0,0.06),
inset -6px -6px 14px rgba(255,255,255,0.95);
}

.balance{
font-size:72px;
font-weight:800;
color:#14213d;
text-shadow:2px 2px 4px rgba(0,0,0,0.08);
}

.top-row{
display:flex;
gap:14px;
margin-top:18px;
position:relative;
z-index:2;
}

.top-btn{
flex:1;
padding:14px;
border:none;
border-radius:18px;
background:#eef3f9;
font-size:14px;
font-weight:700;

box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.95);
}

.blue{
color:#2563eb;
}

.red{
color:#ef4444;
}

/* ===== ACTION BUTTONS ===== */

.action-box{
margin-top:22px;
background:#eef3f9;
padding:12px;
border-radius:28px;

box-shadow:
8px 8px 18px rgba(0,0,0,0.08),
-8px -8px 18px rgba(255,255,255,0.95);

display:flex;
gap:12px;
}

.action-btn{
flex:1;
background:#f4f7fb;
padding:18px 10px;
border-radius:22px;
text-align:center;
font-size:15px;
font-weight:800;
color:#1e293b;

box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.95);
}

/* ===== STATS ===== */

.stats{
display:flex;
gap:16px;
margin-top:22px;
}

.stat-card{
flex:1;
background:#eef3f9;
padding:22px;
border-radius:30px;
text-align:center;

box-shadow:
10px 10px 22px rgba(0,0,0,0.08),
-10px -10px 22px rgba(255,255,255,0.95);
}

.icon{
width:72px;
height:72px;
border-radius:50%;
margin:auto;
margin-bottom:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
background:#eef3f9;

box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.95);
}

.stat-title{
font-size:13px;
font-weight:700;
color:#6b7280;
letter-spacing:1px;
}

.stat-value{
font-size:54px;
font-weight:800;
margin-top:10px;
}

/* ===== REFER CARD ===== */

.refer-card{
margin-top:24px;
background:#eef3f9;
padding:26px;
border-radius:34px;

box-shadow:
10px 10px 22px rgba(0,0,0,0.08),
-10px -10px 22px rgba(255,255,255,0.95);
}

.refer-title{
font-size:34px;
font-weight:800;
text-align:center;
margin-bottom:14px;
}

.refer-text{
text-align:center;
font-size:16px;
line-height:1.7;
font-weight:600;
color:#4b5563;
}

.link-box{
margin-top:24px;
background:#eef3f9;
border-radius:24px;
padding:10px;
display:flex;
align-items:center;
gap:10px;

box-shadow:
inset 5px 5px 10px rgba(0,0,0,0.06),
inset -5px -5px 10px rgba(255,255,255,0.95);
}

.link{
flex:1;
padding:14px;
font-size:14px;
white-space:nowrap;
overflow:hidden;
color:#374151;
}

.copy-btn{
width:64px;
height:64px;
border:none;
border-radius:20px;
font-size:26px;
color:white;
background:linear-gradient(145deg,#5ca8ff,#005eff);

box-shadow:
5px 5px 12px rgba(0,0,0,0.15),
-2px -2px 6px rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div class="balance-card">

<div class="title">
💳 TOTAL BALANCE
</div>

<div class="balance-box">
<div class="balance">₹7.00</div>
</div>

<div class="top-row">
<button class="top-btn blue">INSTANT PAYMENT</button>
<button class="top-btn red">LOVE INDIA</button>
</div>

</div>

<div class="action-box">

<div class="action-btn">
👥 REFER
</div>

<div class="action-btn">
🕘 HISTORY
</div>

<div class="action-btn">
⚡ PAYOUT
</div>

</div>

<div class="stats">

<div class="stat-card">

<div class="icon">
👥
</div>

<div class="stat-title">
TOTAL REFERRALS
</div>

<div class="stat-value">
0
</div>

</div>

<div class="stat-card">

<div class="icon">
🎁
</div>

<div class="stat-title">
PER INVITE
</div>

<div class="stat-value">
₹3
</div>

</div>

</div>

<div class="refer-card">

<div class="refer-title">
Invite & Earn
</div>

<div class="refer-text">
Share your link and earn ₹3 instantly for every friend who joins!
</div>

<div class="link-box">

<div class="link">
https://t.me/cashhungama_bot?start=728
</div>

<button class="copy-btn">
📋
</button>

</div>

</div>

</body>
  </html>
