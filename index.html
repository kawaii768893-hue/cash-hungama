<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#edf1f7;
color:#1f2937;
}

.header{
padding:20px;
font-size:32px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
border-radius:25px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.balance{
font-size:60px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

.row{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.stat{
flex:1;
background:white;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.stat h1{
font-size:50px;
margin:10px 0;
}

.linkbox{
display:flex;
background:#f3f4f6;
border-radius:15px;
overflow:hidden;
margin-top:15px;
}

.linkbox input{
flex:1;
padding:18px;
border:none;
background:none;
font-size:16px;
}

.copy{
background:#3b82f6;
color:white;
border:none;
padding:18px;
font-weight:bold;
}

.back{
margin-bottom:20px;
padding:12px 20px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:black;
color:white;
}

.input{
width:100%;
padding:18px;
margin-top:15px;
border:none;
border-radius:15px;
background:#f3f4f6;
font-size:18px;
box-sizing:border-box;
}

.withdrawbtn{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
background:#10b981;
color:white;
}

.history-item{
background:white;
padding:18px;
border-radius:18px;
margin-top:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="header">
Cash Hungama 🔥
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<div style="font-size:18px;">TOTAL BALANCE</div>

<div class="balance">₹7.00</div>

<div class="row">
<button class="btn">INSTANT PAYMENT</button>
<button class="btn">LOVE INDIA</button>
</div>
</div>

<div class="card">
<div class="row">
<button class="btn" onclick="showPage('refer')">👥 REFER</button>
<button class="btn" onclick="showPage('history')">🕘 HISTORY</button>
<button class="btn" onclick="showPage('withdraw')">⚡ PAYOUT</button>
</div>
</div>

<div class="row">
<div class="stat">
<div>👥 TOTAL REFERRALS</div>
<h1>0</h1>
</div>

<div class="stat">
<div>🎁 PER INVITE</div>
<h1>₹3</h1>
</div>
</div>

</div>

<!-- REFER PAGE -->
<div id="refer" class="page">

<button class="back" onclick="showPage('home')">← Back</button>

<div class="card">
<h1>Invite & Earn</h1>

<p>Share your link and earn ₹3 instantly for every friend who joins!</p>

<div class="linkbox">
<input id="refLink" value="https://t.me/cashhungama_bot?start=728" readonly>
<button class="copy" onclick="copyLink()">COPY</button>
</div>

</div>

</div>

<!-- WITHDRAW PAGE -->
<div id="withdraw" class="page">

<button class="back" onclick="showPage('home')">← Back</button>

<div class="card">

<h1>Payout Request</h1>

<input class="input" placeholder="Enter Amount">

<input class="input" placeholder="UPI ID">

<button class="withdrawbtn">
Withdraw Now
</button>

</div>

</div>

<!-- HISTORY PAGE -->
<div id="history" class="page">

<button class="back" onclick="showPage('home')">← Back</button>

<div class="card">
<h1>History</h1>

<div class="history-item">
Referral Bonus +₹3
</div>

<div class="history-item">
Daily Bonus +₹1
</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(page).classList.add("active");

}

function copyLink(){

let copyText=document.getElementById("refLink");

copyText.select();

document.execCommand("copy");

alert("Referral Link Copied");

}

</script>

</body>
  </html>
