<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eagle Fand 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#edf2f7;
max-width:430px;
margin:auto;
padding:16px;
color:#1e293b;
overflow-x:hidden;
}

/* TOP */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.topbar-left{
display:flex;
align-items:center;
gap:14px;
font-size:18px;
font-weight:700;
}

.topicon{
font-size:30px;
}

.menu{
font-size:28px;
}

/* WELCOME */

.welcome{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.welcome small{
font-size:13px;
font-weight:700;
color:#94a3b8;
letter-spacing:2px;
}

.welcome h1{
font-size:52px;
font-weight:800;
line-height:1;
color:#14213d;
}

.profile{
width:66px;
height:66px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
background:#edf2f7;

box-shadow:
8px 8px 18px rgba(0,0,0,0.08),
-8px -8px 18px rgba(255,255,255,0.95);
}

/* BALANCE CARD */

.balance-card{
background:#edf2f7;
padding:22px;
border-radius:36px;

box-shadow:
12px 12px 26px rgba(0,0,0,0.08),
-12px -12px 26px rgba(255,255,255,0.96);

margin-bottom:22px;
}

.title{
font-size:13px;
font-weight:800;
letter-spacing:2px;
color:#7b8794;
margin-bottom:18px;
}

.balance-box{
padding:24px;
border-radius:28px;
text-align:center;
background:#edf2f7;

box-shadow:
inset 5px 5px 10px rgba(0,0,0,0.05),
inset -5px -5px 10px rgba(255,255,255,0.96);
}

.balance{
font-size:74px;
font-weight:800;
color:#14213d;
text-shadow:2px 2px 4px rgba(0,0,0,0.08);
}

.top-row{
display:flex;
gap:14px;
margin-top:18px;
}

.top-btn{
flex:1;
padding:14px;
border:none;
border-radius:18px;
font-size:14px;
font-weight:700;
background:#edf2f7;

box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.95);
}

.blue{
color:#2563eb;
}

.red{
color:#ef4444;
}

/* ACTIONS */

.actions{
display:flex;
gap:12px;
padding:12px;
border-radius:24px;
margin-bottom:22px;
background:#edf2f7;

box-shadow:
8px 8px 18px rgba(0,0,0,0.08),
-8px -8px 18px rgba(255,255,255,0.95);
}

.action-btn{
flex:1;
padding:18px 10px;
border-radius:20px;
text-align:center;
font-size:15px;
font-weight:700;
background:#edf2f7;

box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.95);
}

/* RECENT ACTIVITY */

.activity-card{
padding:22px;
border-radius:36px;
background:#edf2f7;

box-shadow:
12px 12px 24px rgba(0,0,0,0.08),
-12px -12px 24px rgba(255,255,255,0.96);
}

.activity-title{
font-size:20px;
font-weight:800;
margin-bottom:18px;
color:#14213d;
}

.line{
height:1px;
background:#d7dee7;
margin-bottom:20px;
}

.activity-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
border-radius:26px;
background:#edf2f7;

box-shadow:
inset 2px 2px 4px rgba(0,0,0,0.04),
inset -2px -2px 4px rgba(255,255,255,0.96);
}

.activity-left{
display:flex;
align-items:center;
gap:16px;
}

.activity-icon{
width:66px;
height:66px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#00a86b;
background:#edf2f7;

box-shadow:
6px 6px 12px rgba(0,0,0,0.08),
-6px -6px 12px rgba(255,255,255,0.95);
}

.activity-name{
font-size:18px;
font-weight:700;
}

.activity-time{
font-size:12px;
font-weight:600;
color:#6b7280;
margin-top:3px;
}

.activity-amount{
font-size:24px;
font-weight:800;
color:#00a86b;
}

/* ANIMATION */

.balance-card,
.actions,
.activity-card{
animation:up .7s ease;
}

@keyframes up{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button{
cursor:pointer;
transition:.25s;
}

button:active,
.action-btn:active{
transform:scale(.95);
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="topbar-left">
<div class="topicon">✕</div>
<div>Eagle Fand 🔥</div>
</div>

<div class="menu">⋮</div>

</div>

<!-- WELCOME -->

<div class="welcome">

<div>
<small>WELCOME BACK</small>
<h1>Kaito 👋</h1>
</div>

<div class="profile">
🧑‍💻
</div>

</div>

<!-- BALANCE -->

<div class="balance-card">

<div class="title">
💳 TOTAL BALANCE
</div>

<div class="balance-box">

<div class="balance" id="balance">
₹7.00
</div>

</div>

<div class="top-row">

<button class="top-btn blue">
INSTANT PAYMENT
</button>

<button class="top-btn red">
LOVE INDIA
</button>

</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<div class="action-btn">
👥 REFER
</div>

<div class="action-btn">
🕘 HISTORY
</div>

<div class="action-btn">
⚡ PAYOUT
</div>

</div>

<!-- ACTIVITY -->

<div class="activity-card">

<div class="activity-title">
☰ Recent Activity
</div>

<div class="line"></div>

<div class="activity-item">

<div class="activity-left">

<div class="activity-icon">
⬇
</div>

<div>

<div class="activity-name">
Bonus
</div>

<div class="activity-time">
16 MAY 2026, 05:37 PM
</div>

</div>

</div>

<div class="activity-amount">
+₹7.00
</div>

</div>

</div>

<script>

let count = 0;

let target = 7;

let balance = document.getElementById("balance");

let counter = setInterval(()=>{

count++;

balance.innerHTML = "₹" + count + ".00";

if(count >= target){

clearInterval(counter);

}

},120);

</script>

</body>
  </html>
