<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0d0d0d;
color:white;
padding:15px;
}

.header{
text-align:center;
margin-top:20px;
}

.header h1{
font-size:38px;
color:#00ff99;
}

.balance{
background:linear-gradient(135deg,#00ff99,#00b36b);
padding:25px;
border-radius:20px;
margin-top:25px;
text-align:center;
box-shadow:0 0 20px #00ff99;
}

.balance h2{
font-size:18px;
opacity:0.8;
}

.balance h1{
font-size:42px;
margin-top:10px;
}

.btn{
display:block;
width:100%;
padding:16px;
border:none;
border-radius:15px;
margin-top:18px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.bonus{
background:#ffcc00;
color:black;
}

.withdraw{
background:#00ff99;
color:black;
}

.telegram{
background:#229ED9;
color:white;
}

.btn:hover{
transform:scale(1.03);
}

.card{
background:#1a1a1a;
padding:18px;
border-radius:18px;
margin-top:20px;
}

.card h3{
margin-bottom:10px;
color:#00ff99;
}

.refbox{
background:black;
padding:12px;
border-radius:10px;
margin-top:10px;
word-break:break-all;
}

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:14px;
border-top:1px solid #333;
}

.footer div{
text-align:center;
font-size:14px;
color:white;
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#00ff99;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
display:none;
animation:fade 3s linear;
}

@keyframes fade{
0%{opacity:0; transform:translateY(-20px);}
10%{opacity:1;}
90%{opacity:1;}
100%{opacity:0; transform:translateY(-20px);}
}
</style>
</head>

<body>

<div class="popup" id="popup">
Someone earned ₹50
</div>

<div class="header">
<h1>Cash Hungama 💸</h1>
<p>Daily Free Deposit</p>
</div>

<div class="balance">
<h2>Your Balance</h2>
<h1 id="money">₹100</h1>
</div>

<button class="btn bonus" onclick="claimBonus()">
🎁 Claim Daily Bonus
</button>

<button class="btn telegram" onclick="joinTG()">
📢 Join Telegram Channel
</button>

<button class="btn withdraw">
💸 Withdraw Money
</button>

<div class="card">
<h3>👥 Referral Program</h3>
<p>Invite friends and earn ₹25 per referral.</p>

<div class="refbox">
https://cashhungama.github.io/?ref=9282
</div>
</div>

<div class="card">
<h3>🔥 Today's Earnings</h3>
<p>+ ₹15 Bonus</p>
<p>+ ₹25 Referral</p>
<p>+ ₹10 Task Reward</p>
</div>

<div class="footer">
<div>🏠<br>Home</div>
<div>💰<br>Earn</div>
<div>👥<br>Refer</div>
<div>⚙️<br>Profile</div>
</div>

<script>

let balance = 100;

function claimBonus(){
balance += 20;
document.getElementById("money").innerText = "₹" + balance;
alert("Daily Bonus Claimed +₹20");
}

function joinTG(){
window.location.href="https://t.me/telegram";
}

let names = ["Rahul","Aman","Priya","Sahil","Rohit","Karan"];

setInterval(()=>{
let popup=document.getElementById("popup");
let randomName=names[Math.floor(Math.random()*names.length)];
let randomMoney=Math.floor(Math.random()*90)+10;

popup.innerText=randomName+" earned ₹"+randomMoney;
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},3000);

},5000);

</script>

</body>
  </html>
