<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef1f5;
padding:20px;
color:#1f2b46;
}

.balance-card{
background:#edf1f7;
border-radius:35px;
padding:25px;
box-shadow:
10px 10px 25px rgba(0,0,0,0.08),
-10px -10px 25px rgba(255,255,255,0.9);
position:relative;
overflow:hidden;
margin-bottom:25px;
}

.balance-card::before{
content:'';
position:absolute;
top:-80px;
left:-40px;
width:250px;
height:180px;
background:rgba(255,255,255,0.5);
transform:rotate(-15deg);
border-radius:50px;
}

.small-text{
font-size:14px;
font-weight:700;
letter-spacing:2px;
color:#6b7280;
margin-bottom:20px;
}

.balance-box{
background:#edf1f7;
padding:30px;
border-radius:25px;
text-align:center;
font-size:60px;
font-weight:800;

box-shadow:
inset 5px 5px 12px rgba(0,0,0,0.08),
inset -5px -5px 12px rgba(255,255,255,0.9);
}

.top-buttons{
display:flex;
gap:15px;
margin-top:25px;
}

.top-btn{
flex:1;
padding:14px;
border:none;
border-radius:18px;
font-weight:700;
font-size:14px;
background:#edf1f7;
box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.9);
}

.blue{
color:#2563eb;
}

.red{
color:#ef4444;
}

.action-row{
display:flex;
gap:15px;
margin-bottom:25px;
}

.action-btn{
flex:1;
background:#edf1f7;
padding:18px;
border-radius:22px;
text-align:center;
font-weight:700;
font-size:18px;

box-shadow:
5px 5px 12px rgba(0,0,0,0.08),
-5px -5px 12px rgba(255,255,255,0.9);
}

.stats{
display:flex;
gap:18px;
margin-bottom:25px;
}

.stat-card{
flex:1;
background:#edf1f7;
padding:25px;
border-radius:30px;
text-align:center;

box-shadow:
10px 10px 20px rgba(0,0,0,0.08),
-10px -10px 20px rgba(255,255,255,0.9);
}

.stat-icon{
font-size:34px;
margin-bottom:15px;
}

.stat-title{
font-size:14px;
font-weight:700;
letter-spacing:1px;
color:#6b7280;
margin-bottom:10px;
}

.stat-value{
font-size:50px;
font-weight:800;
}

.refer-card{
background:#edf1f7;
padding:28px;
border-radius:30px;

box-shadow:
10px 10px 20px rgba(0,0,0,0.08),
-10px -10px 20px rgba(255,255,255,0.9);
}

.refer-title{
font-size:38px;
font-weight:800;
text-align:center;
margin-bottom:15px;
}

.refer-text{
text-align:center;
font-size:18px;
font-weight:600;
line-height:1.7;
margin-bottom:25px;
}

.link-box{
display:flex;
align-items:center;
background:#edf1f7;
border-radius:22px;
padding:10px;

box-shadow:
inset 4px 4px 10px rgba(0,0,0,0.08),
inset -4px -4px 10px rgba(255,255,255,0.9);
}

.link-input{
flex:1;
border:none;
background:transparent;
padding:15px;
font-size:16px;
outline:none;
}

.copy-btn{
width:70px;
height:70px;
border:none;
border-radius:22px;
font-size:28px;
background:linear-gradient(145deg,#4f9cff,#0066ff);
color:white;

box-shadow:
5px 5px 12px rgba(0,0,0,0.2),
-3px -3px 10px rgba(255,255,255,0.4);
}

</style>
</head>

<body>

<div class="balance-card">

<div class="small-text">
🧾 TOTAL BALANCE
</div>

<div class="balance-box">
₹7.00
</div>

<div class="top-buttons">
<button class="top-btn blue">INSTANT PAYMENT</button>
<button class="top-btn red">LOVE INDIA</button>
</div>

</div>

<div class="action-row">

<div class="action-btn">
👥 REFER
</div>

<div class="action-btn">
🕘 HISTORY
</div>

<div class="action-btn">
⚡ PAYOUT
</div>

</div>

<div class="stats">

<div class="stat-card">
<div class="stat-icon">👥</div>
<div class="stat-title">TOTAL REFERRALS</div>
<div class="stat-value">0</div>
</div>

<div class="stat-card">
<div class="stat-icon">🎁</div>
<div class="stat-title">PER INVITE</div>
<div class="stat-value">₹3</div>
</div>

</div>

<div class="refer-card">

<div class="refer-title">
Invite & Earn
</div>

<div class="refer-text">
Share your link and earn <span style="color:#2563eb;">₹3 instantly</span> for every friend who joins!
</div>

<div class="link-box">

<input class="link-input" value="https://t.me/cashhungama_bot?start=728" readonly>

<button class="copy-btn">
📋
</button>

</div>

</div>

</body>
</html>
