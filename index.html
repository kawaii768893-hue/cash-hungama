<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eagle Fan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#edf2f7;
max-width:430px;
margin:auto;
padding:14px;
overflow-x:hidden;
color:#0f172a;
}

/* ===== TOP ===== */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.top-left{
display:flex;
align-items:center;
gap:12px;
font-size:18px;
font-weight:700;
}

.close{
font-size:28px;
font-weight:400;
}

.menu{
font-size:28px;
}

/* ===== USER ===== */

.user-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.welcome{
font-size:11px;
font-weight:700;
letter-spacing:2px;
color:#94a3b8;
margin-bottom:4px;
}

.username{
font-size:46px;
font-weight:800;
line-height:1;
letter-spacing:-1px;
}

.avatar{
width:62px;
height:62px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
background:#edf2f7;

box-shadow:
7px 7px 18px rgba(0,0,0,.08),
-7px -7px 18px rgba(255,255,255,.96);
}

/* ===== CARD ===== */

.balance-card{
padding:18px;
border-radius:34px;
background:#edf2f7;

box-shadow:
10px 10px 24px rgba(0,0,0,.08),
-10px -10px 24px rgba(255,255,255,.98);

margin-bottom:18px;
}

.card-title{
font-size:12px;
font-weight:800;
letter-spacing:2px;
color:#7b8794;
margin-bottom:16px;
}

.balance-box{
padding:24px 10px;
border-radius:26px;
text-align:center;
background:#edf2f7;

box-shadow:
inset 5px 5px 10px rgba(0,0,0,.05),
inset -5px -5px 10px rgba(255,255,255,.95);
}

.balance{
font-size:68px;
font-weight:800;
color:#14213d;
line-height:1;
}

.top-buttons{
display:flex;
gap:10px;
margin-top:16px;
}

.top-btn{
flex:1;
padding:13px;
border:none;
border-radius:16px;
background:#edf2f7;
font-size:13px;
font-weight:700;

box-shadow:
5px 5px 10px rgba(0,0,0,.08),
-5px -5px 10px rgba(255,255,255,.96);
}

.blue{
color:#2563eb;
}

.red{
color:#ef4444;
}

/* ===== ACTIONS ===== */

.actions{
display:flex;
gap:10px;
padding:10px;
border-radius:22px;
margin-bottom:18px;
background:#edf2f7;

box-shadow:
8px 8px 18px rgba(0,0,0,.08),
-8px -8px 18px rgba(255,255,255,.96);
}

.action-btn{
flex:1;
padding:16px 8px;
border-radius:18px;
text-align:center;
font-size:13px;
font-weight:700;
background:#edf2f7;

box-shadow:
5px 5px 10px rgba(0,0,0,.08),
-5px -5px 10px rgba(255,255,255,.96);
}

/* ===== RECENT ===== */

.activity-card{
padding:18px;
border-radius:34px;
background:#edf2f7;

box-shadow:
10px 10px 24px rgba(0,0,0,.08),
-10px -10px 24px rgba(255,255,255,.98);
}

.activity-title{
font-size:18px;
font-weight:800;
margin-bottom:16px;
}

.line{
height:1px;
background:#d9e1ea;
margin-bottom:16px;
}

.activity-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
border-radius:24px;
background:#edf2f7;

box-shadow:
inset 2px 2px 5px rgba(0,0,0,.04),
inset -2px -2px 5px rgba(255,255,255,.96);
}

.activity-left{
display:flex;
align-items:center;
gap:14px;
}

.activity-icon{
width:58px;
height:58px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:#00a86b;
background:#edf2f7;

box-shadow:
5px 5px 10px rgba(0,0,0,.08),
-5px -5px 10px rgba(255,255,255,.96);
}

.activity-name{
font-size:16px;
font-weight:700;
}

.activity-time{
font-size:11px;
font-weight:600;
color:#6b7280;
margin-top:3px;
}

.activity-amount{
font-size:20px;
font-weight:800;
color:#00a86b;
}

/* ===== ANIMATION ===== */

.balance-card,
.actions,
.activity-card{
animation:up .6s ease;
}

@keyframes up{
from{
opacity:0;
transform:translateY(18px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.action-btn:active,
.top-btn:active{
transform:scale(.96);
}

</style>
</head>

<body>

<!-- TOP -->

<div class="topbar">

<div class="top-left">
<div class="close">✕</div>
<div>Eagle Fand 🔥</div>
</div>

<div class="menu">⋮</div>

</div>

<!-- USER -->

<div class="user-box">

<div>
<div class="welcome">
WELCOME BACK
</div>

<div class="username">
Kaito 👋
</div>
</div>

<div class="avatar">
🧑🏻‍💻
</div>

</div>

<!-- BALANCE -->

<div class="balance-card">

<div class="card-title">
💳 TOTAL BALANCE
</div>

<div class="balance-box">

<div class="balance">
₹7.00
</div>

</div>

<div class="top-buttons">

<button class="top-btn blue">
INSTANT PAYMENT
</button>

<button class="top-btn red">
LOVE INDIA
</button>

</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<div class="action-btn">
👥 REFER
</div>

<div class="action-btn">
🕘 HISTORY
</div>

<div class="action-btn">
⚡ PAYOUT
</div>

</div>

<!-- RECENT -->

<div class="activity-card">

<div class="activity-title">
☰ Recent Activity
</div>

<div class="line"></div>

<div class="activity-item">

<div class="activity-left">

<div class="activity-icon">
⬇
</div>

<div>

<div class="activity-name">
Bonus
</div>

<div class="activity-time">
16 MAY 2026, 05:37 PM
</div>

</div>

</div>

<div class="activity-amount">
+₹7.00
</div>

</div>

</div>

</body>
  </html>
