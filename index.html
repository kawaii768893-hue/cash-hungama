<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== MOBILE FIXED SIZE ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#eef3f9;
  font-family:Arial,sans-serif;
  max-width:430px;
  margin:auto;
  overflow-x:hidden;
  padding:14px;
}

/* ===== TOP BALANCE CARD ===== */
.balance-card{
  background:#f4f7fb;
  border-radius:30px;
  padding:20px;
  box-shadow:
    10px 10px 25px rgba(0,0,0,.08),
    -10px -10px 25px rgba(255,255,255,.9);
  border:1px solid #dfe6ef;
  margin-bottom:18px;
}

.balance-title{
  font-size:15px;
  font-weight:700;
  color:#667085;
  letter-spacing:2px;
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:18px;
}

.balance-box{
  background:#edf2f8;
  border-radius:24px;
  padding:24px;
  text-align:center;
  border:1px solid #d6dee8;

  box-shadow:
    inset 5px 5px 10px rgba(0,0,0,.05),
    inset -5px -5px 10px rgba(255,255,255,.9);
}

.balance-amount{
  font-size:68px;
  font-weight:900;
  color:#14213d;
  text-shadow:2px 2px 4px rgba(0,0,0,.08);
}

.balance-buttons{
  display:flex;
  gap:12px;
  margin-top:18px;
}

.small-btn{
  flex:1;
  padding:14px;
  border-radius:16px;
  border:1px solid #d4dce6;
  background:#f4f7fb;
  font-weight:700;
  font-size:15px;

  box-shadow:
    4px 4px 8px rgba(0,0,0,.08),
    -4px -4px 8px rgba(255,255,255,.9);
}

.blue{
  color:#1d5eff;
}

.red{
  color:#ff4d57;
}

/* ===== 3 BUTTONS ===== */
.menu-box{
  background:#edf2f8;
  border-radius:24px;
  padding:12px;
  display:flex;
  gap:12px;
  margin-bottom:22px;

  box-shadow:
    6px 6px 12px rgba(0,0,0,.08),
    -6px -6px 12px rgba(255,255,255,.9);
}

.menu-btn{
  flex:1;
  background:#f5f7fb;
  border-radius:18px;
  padding:18px 8px;
  text-align:center;
  font-size:15px;
  font-weight:800;
  color:#27364d;
  border:1px solid #cfd7e3;

  box-shadow:
    4px 4px 10px rgba(0,0,0,.08),
    -4px -4px 10px rgba(255,255,255,.95);
}

/* ===== MINI CARDS ===== */
.stats{
  display:flex;
  gap:18px;
  margin-bottom:24px;
}

.stat-card{
  flex:1;
  background:#f4f7fb;
  border-radius:28px;
  padding:22px;
  text-align:center;
  min-height:180px;

  box-shadow:
    8px 8px 18px rgba(0,0,0,.08),
    -8px -8px 18px rgba(255,255,255,.95);
}

.circle-icon{
  width:70px;
  height:70px;
  border-radius:50%;
  margin:auto;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f4f7fb;

  box-shadow:
    5px 5px 10px rgba(0,0,0,.08),
    -5px -5px 10px rgba(255,255,255,.95);
}

.stat-title{
  color:#6a7689;
  font-size:14px;
  font-weight:800;
  letter-spacing:1px;
}

.stat-value{
  font-size:56px;
  font-weight:900;
  margin-top:10px;
  color:#132238;
}

/* ===== REFER CARD ===== */
.refer-card{
  background:#f8fafc;
  border-radius:30px;
  padding:24px;
  margin-bottom:25px;

  box-shadow:
    8px 8px 20px rgba(0,0,0,.08),
    -8px -8px 20px rgba(255,255,255,.95);
}

.refer-title{
  font-size:24px;
  font-weight:900;
  text-align:center;
  margin-bottom:14px;
  color:#17253d;
}

.refer-text{
  text-align:center;
  color:#4b5b72;
  font-size:18px;
  line-height:1.5;
  font-weight:700;
}

.refer-link-box{
  margin-top:24px;
  background:#edf2f8;
  border-radius:22px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;

  box-shadow:
    inset 4px 4px 8px rgba(0,0,0,.05),
    inset -4px -4px 8px rgba(255,255,255,.95);
}

.refer-link{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
  color:#49576c;
  font-size:15px;
}

.copy-btn{
  width:60px;
  height:60px;
  border-radius:18px;
  border:none;
  background:linear-gradient(145deg,#4ea0ff,#0057ff);
  color:white;
  font-size:24px;

  box-shadow:
    5px 5px 12px rgba(0,0,0,.2),
    inset -2px -2px 6px rgba(255,255,255,.3);
}

/* ===== EXTRA OPTIONS ===== */
.extra-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.extra-card{
  background:#f4f7fb;
  padding:20px;
  border-radius:24px;
  text-align:center;
  font-weight:800;
  color:#23324a;

  box-shadow:
    6px 6px 14px rgba(0,0,0,.08),
    -6px -6px 14px rgba(255,255,255,.95);
  }
</style>
</head>

<body>

<div class="balance-card">

<div class="small-text">
🧾 TOTAL BALANCE
</div>

<div class="balance-box">
₹7.00
</div>

<div class="top-buttons">
<button class="top-btn blue">INSTANT PAYMENT</button>
<button class="top-btn red">LOVE INDIA</button>
</div>

</div>

<div class="action-row">

<div class="action-btn">
👥 REFER
</div>

<div class="action-btn">
🕘 HISTORY
</div>

<div class="action-btn">
⚡ PAYOUT
</div>

</div>

<div class="stats">

<div class="stat-card">
<div class="stat-icon">👥</div>
<div class="stat-title">TOTAL REFERRALS</div>
<div class="stat-value">0</div>
</div>

<div class="stat-card">
<div class="stat-icon">🎁</div>
<div class="stat-title">PER INVITE</div>
<div class="stat-value">₹3</div>
</div>

</div>

<div class="refer-card">

<div class="refer-title">
Invite & Earn
</div>

<div class="refer-text">
Share your link and earn <span style="color:#2563eb;">₹3 instantly</span> for every friend who joins!
</div>

<div class="link-box">

<input class="link-input" value="https://t.me/cashhungama_bot?start=728" readonly>

<button class="copy-btn">
📋
</button>

</div>

</div>

</body>
</html>
