<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#070816;
overflow:hidden;
color:white;
height:100vh;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
background-size:40px 40px;
animation:bgmove 8s linear infinite;
}

@keyframes bgmove{
0%{transform:translateY(0);}
100%{transform:translateY(40px);}
}

.glow{
position:absolute;
width:300px;
height:300px;
background:#6c3bff;
filter:blur(120px);
opacity:0.35;
top:-80px;
left:-80px;
}

.glow2{
position:absolute;
width:300px;
height:300px;
background:#00ffd5;
filter:blur(120px);
opacity:0.25;
bottom:-80px;
right:-80px;
}

.container{
position:relative;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:390px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
border-radius:30px;
padding:35px 25px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:38px;
font-weight:700;
margin-bottom:10px;
background:linear-gradient(90deg,#8a5cff,#00ffd5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:14px;
color:#bbb;
margin-bottom:30px;
}

.verify-box{
margin-top:20px;
padding:22px;
border-radius:22px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
}

.loader{
width:90px;
height:90px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.08);
border-top:6px solid #8a5cff;
margin:0 auto 25px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.status{
font-size:22px;
font-weight:600;
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#aaa;
line-height:1.6;
}

.done{
display:none;
animation:fade 1s ease;
}

.check{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#00ffae,#00ffd5);
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
margin:0 auto 25px;
box-shadow:0 0 35px rgba(0,255,174,0.5);
}

.btn{
margin-top:30px;
width:100%;
padding:17px;
border:none;
border-radius:18px;
font-size:17px;
font-weight:600;
background:linear-gradient(90deg,#7a5cff,#00ffd5);
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
}

.footer{
margin-top:25px;
font-size:12px;
color:#777;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="glow2"></div>

<div class="container">

<div class="card">

<div class="logo">Cash Hungama</div>
<div class="subtitle">Telegram Mini App Verification</div>

<div class="verify-box" id="loadingBox">

<div class="loader"></div>

<div class="status" id="statusText">
Verifying Device...
</div>

<div class="desc" id="descText">
Please wait while we securely verify your Telegram account and device.
</div>

</div>

<div class="verify-box done" id="doneBox">

<div class="check">✓</div>

<div class="status">
Verification Complete
</div>

<div class="desc">
Your device has been verified successfully.<br>
You can now continue to Cash Hungama.
</div>

<button class="btn" onclick="openApp()">
OPEN CASH HUNGAMA
</button>

</div>

<div class="footer">
Secured by Telegram WebApp Security
</div>

</div>

</div>

<script>

let texts = [
"Checking Telegram Account...",
"Verifying Device...",
"Checking Channel Membership...",
"Securing Session...",
"Finalizing Verification..."
];

let i = 0;

let interval = setInterval(() => {

document.getElementById("statusText").innerText = texts[i];

i++;

if(i >= texts.length){

clearInterval(interval);

setTimeout(() => {

document.getElementById("loadingBox").style.display="none";
document.getElementById("doneBox").style.display="block";

},1000);

}

},1800);

function openApp(){

window.location.href="https://768893-hue.github.io/";

}

</script>

</body>
  </html>
