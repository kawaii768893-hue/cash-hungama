<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Hungama</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#050816;
color:white;
padding:20px;
padding-bottom:120px;
background-image:
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
background-size:40px 40px;
}

.logo{
font-size:42px;
font-weight:800;
margin-top:10px;
background:linear-gradient(90deg,#8b5cf6,#00f5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.balance-card{
margin-top:30px;
background:linear-gradient(135deg,#8b5cf6,#00bfff);
padding:30px;
border-radius:30px;
box-shadow:0 0 25px #00bfff55;
}

.balance-card p{
font-size:22px;
opacity:.9;
}

.balance{
font-size:70px;
font-weight:800;
margin-top:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.card-btn{
background:#11152e;
padding:25px 10px;
border-radius:24px;
text-align:center;
font-size:20px;
font-weight:700;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.05);
}

.card-btn:active{
transform:scale(.96);
}

.section{
margin-top:25px;
background:rgba(17,21,46,.95);
padding:25px;
border-radius:28px;
display:none;
border:1px solid rgba(255,255,255,.05);
}

.section.active{
display:block;
}

.input{
width:100%;
padding:18px;
margin-top:15px;
border:none;
outline:none;
border-radius:18px;
background:#1b2147;
color:white;
font-size:18px;
}

.main-btn{
width:100%;
padding:18px;
border:none;
margin-top:20px;
border-radius:18px;
font-size:20px;
font-weight:700;
background:linear-gradient(90deg,#00ffd5,#00bfff);
color:black;
}

.ref-box{
margin-top:15px;
background:#0c1025;
padding:18px;
border-radius:18px;
word-break:break-all;
font-size:18px;
}

.user-card{
display:flex;
justify-content:space-between;
padding:18px;
margin-top:15px;
background:#151938;
border-radius:20px;
}

.bottom-nav{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#11152e;
display:flex;
justify-content:space-around;
padding:18px;
border-radius:30px;
box-shadow:0 0 20px #00000055;
}

.nav-btn{
text-align:center;
font-size:18px;
color:#aaa;
cursor:pointer;
}

.nav-btn.active{
color:#8b5cf6;
font-weight:700;
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#00ff99;
color:black;
padding:14px 20px;
border-radius:16px;
font-weight:700;
display:none;
z-index:999;
animation:pop .4s;
}

@keyframes pop{
from{
transform:translateY(-20px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}
</style>
</head>

<body>

<div class="popup" id="popup">
Sahil earned ₹51
</div>

<div class="logo">
Cash Hungama
</div>

<div class="balance-card">
<p>Total Balance</p>
<div class="balance">₹100</div>
</div>

<div class="grid">

<div class="card-btn" onclick="claimBonus()">
🎁 Daily Bonus
</div>

<div class="card-btn" onclick="showSection('withdraw')">
💸 Withdraw
</div>

<div class="card-btn" onclick="showSection('refer')">
👥 Invite
</div>

<div class="card-btn" onclick="showSection('top')">
🔥 Top Users
</div>

</div>

<!-- REFER -->
<div class="section active" id="refer">

<h2>👥 Refer & Earn</h2>

<p style="margin-top:10px;font-size:18px;">
Invite friends and earn ₹25 instantly for every successful referral.
</p>

<div class="ref-box">
<input class="input" id="refLink" readonly>
</div>

<button class="main-btn" onclick="copyRef()">
COPY REFERRAL LINK
</button>

</div>

<!-- WITHDRAW -->
<div class="section" id="withdraw">

<h2>💸 Withdraw Funds</h2>

<input class="input" type="number" placeholder="Enter Amount">

<input class="input" type="number" placeholder="Enter UPI / Number">

<button class="main-btn" onclick="withdrawNow()">
Withdraw Now
</button>

</div>

<!-- TOP USERS -->
<div class="section" id="top">

<h2>🏆 Top Users</h2>

<div class="user-card">
<span>Rex</span>
<span>₹720</span>
</div>

<div class="user-card">
<span>Sahil</span>
<span>₹510</span>
</div>

<div class="user-card">
<span>Kaito</span>
<span>₹350</span>
</div>

</div>

<div class="bottom-nav">

<div class="nav-btn active" onclick="showSection('refer')">
🏠<br>Home
</div>

<div class="nav-btn" onclick="claimBonus()">
💰<br>Earn
</div>

<div class="nav-btn" onclick="showSection('refer')">
👥<br>Refer
</div>

<div class="nav-btn" onclick="showSection('withdraw')">
⚙️<br>Profile
</div>

</div>

<script>

function showSection(id){

document.querySelectorAll('.section').forEach(sec=>{
sec.classList.remove('active');
});

document.getElementById(id).classList.add('active');

}

function claimBonus(){

alert("₹5 Daily Bonus Added Successfully!");

}

function withdrawNow(){

alert("Withdrawal Request Submitted Successfully!");

}

function copyRef(){

navigator.clipboard.writeText(
"https://t.me/cashhungama_bot?start=728"
);

alert("Referral Link Copied!");

}

setInterval(()=>{

const popup=document.getElementById("popup");

const names=["Rohit","Sahil","Aman","Rex","Kaito","Aryan"];

const amount=Math.floor(Math.random()*90)+10;

const randomName=names[Math.floor(Math.random()*names.length)];

popup.innerHTML=`${randomName} earned ₹${amount}`;

popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},3000);

},6000);

</script>
<script>
const tg = window.Telegram.WebApp;
const user = tg.initDataUnsafe.user;

if(user){
  const refLink =
    `https://t.me/cashhungama_bot?start=${user.id}`;

  document.getElementById("refLink").value = refLink;
}

function copyRef() {
  const copyText = document.getElementById("refLink");

  copyText.select();
  copyText.setSelectionRange(0, 99999);

  navigator.clipboard.writeText(copyText.value);

  alert("Referral Link Copied!");
}
</script>
</body>
</html>
